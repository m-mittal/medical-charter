# ---------------------------------------------------------------------------
# Lab detection patterns.
# Each entry has a regex pattern (searched in the first ~1500 chars of PDF)
# and the canonical lab name to assign.
# ---------------------------------------------------------------------------
lab_patterns:
  - pattern: "L\\s*P\\s*L[\\s\\-]+PUNE\\s+LAB|Lal\\s*Path\\s*Labs"
    name: "Lal PathLabs, Pune"
  - pattern: "Kokilaben\\s+Dhirubhai\\s+Ambani"
    name: "Kokilaben Dhirubhai Ambani Hospital, Mumbai"
  - pattern: "SRL\\s+LIMITED"
    name: SRL Diagnostics
  - pattern: "AAROGYAMM\\s+PATHOLOGY"
    name: "Aarogyamm Pathology, Pune"
  - pattern: "AGARWAL\\s+(PATHOLOGY|DIAGNOSTICS)"
    name: "Agarwal Diagnostics, Ujjain"
  - pattern: "Happy\\s+Hearts\\s+Club|Sancheti"
    name: "Sancheti Hospital, Pune"
  - pattern: "Kalpavraksha|UJJAIN\\s*\\(M\\.?P\\)"
    name: "Dr. Nagar Pathology, Ujjain"
  - pattern: "Evergreen\\s+Care"
    name: "Evergreen Care, Pune"
  - pattern: "P\\s*A\\s*WAR\\s+DIAGNOSTIC"
    name: "Lal PathLabs, Pune"



# ---------------------------------------------------------------------------
# Default unit for each canonical test name.
# Used when the parser can't extract a unit from the PDF text.
# ---------------------------------------------------------------------------
unit_inference:
  Hemoglobin: g/dL
  RBC Count: mill/mm3
  MCV: fL
  MCH: pg
  MCHC: g/dL
  "WBC (Total Leukocyte Count)": thou/mm3
  Platelet Count: thou/mm3
  ESR: mm/hr
  Total Cholesterol: mg/dL
  Triglycerides: mg/dL
  HDL Cholesterol: mg/dL
  LDL Cholesterol: mg/dL
  VLDL Cholesterol: mg/dL
  Non-HDL Cholesterol: mg/dL
  Fasting Blood Glucose: mg/dL
  Post Prandial Blood Glucose: mg/dL
  "Estimated Average Glucose (eAG)": mg/dL
  HbA1C: "%"
  Creatinine: mg/dL
  Urea: mg/dL
  BUN: mg/dL
  Uric Acid: mg/dL
  Calcium: mg/dL
  Phosphorus: mg/dL
  Sodium: mEq/L
  Potassium: mEq/L
  Chloride: mEq/L
  T3: ng/dL
  T4: µg/dL
  Free T3: pg/mL
  Free T4: ng/dL
  TSH: µIU/mL
  CRP: mg/L
  Ferritin: ng/mL
  Vitamin D: ng/mL
  Vitamin B12: pg/mL
  ACTH: pg/mL
  Cortisol: µg/dL
  "SGOT (AST)": U/L
  "SGPT (ALT)": U/L
  "GGTP (GGT)": U/L
  Alkaline Phosphatase: U/L
  Bilirubin Total: mg/dL
  Bilirubin Direct: mg/dL
  Bilirubin Indirect: mg/dL
  Total Protein: g/dL
  Albumin: g/dL
  Globulin: g/dL
  Iron: µg/dL
  TIBC: µg/dL


# ---------------------------------------------------------------------------
# OCR garbled-unit corrections.
# Maps garbled unit (lowercase) → correct unit.
# ---------------------------------------------------------------------------
ocr_unit_fixes:
  ywiu/ml: µIU/mL
  ylu/ml: µIU/mL
  yiu/ml: µIU/mL
  piu/ml: µIU/mL
  ulu/ml: µIU/mL
  pwiu/ml: µIU/mL
  ng/db: ng/dL


# ---------------------------------------------------------------------------
# Per-test unit overrides.
# When OCR produces a wrong unit for a known test, correct it.
# Format:  TestName: { wrong_unit: correct_unit }
# ---------------------------------------------------------------------------
unit_overrides:
  Cortisol:
    g/dL: µg/dL


# ---------------------------------------------------------------------------
# Unit display normalization.
# Maps cosmetic/notation variants to a single canonical spelling.
# Applied AFTER OCR fixes but BEFORE conversions.  No value change — only display.
# ---------------------------------------------------------------------------
unit_display_normalization:
  # case normalization
  mg/dl: mg/dL
  g/dl: g/dL
  ng/dl: ng/dL
  ng/ml: ng/mL
  pg/ml: pg/mL
  ug/dl: µg/dL
  µg/dl: µg/dL
  meq/l: mEq/L
  miu/l: mIU/L
  fl: fL
  u/l: U/L
  iu/ml: IU/mL
  nmol/l: nmol/L
  pmol/l: pmol/L
  mg/l: mg/L
  # notation variants (same physical unit)
  gm/dL: g/dL
  gm/dl: g/dL
  mcg/dL: µg/dL
  mcg/dl: µg/dL
  ug/dL: µg/dL
  uIU/mL: µIU/mL
  uiu/ml: µIU/mL


# ---------------------------------------------------------------------------
# Unit conversions.
# When a test's value is extracted in a non-standard unit, convert it to
# the canonical unit so all data points are comparable on trend charts.
# factor: multiply the value by this number.  e.g. ng/dL → ng/mL is ×0.01
# ---------------------------------------------------------------------------
unit_conversions:
  T3:
    - from: ng/dL
      to: ng/mL
      factor: 0.01



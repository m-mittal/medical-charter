# =============================================================================
# Medical Report Charter — Configuration
# =============================================================================
# Edit this file to add new test names, lab patterns, units, etc.
# The application reads this on startup; restart the server after changes.
# =============================================================================


# ---------------------------------------------------------------------------
# Report types to skip (non-blood-test files). Case-insensitive substring match.
# ---------------------------------------------------------------------------
skip_report_types:
  - ecg
  - echo
  - prescription
  - surgery note
  - discharge summary
  - biopsy
  - mri
  - 2d echo
  - angiography
  - biopsy initial
  - biopsy pdl-1
  - biopsy p16


